<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="game-wrapper">

    <h1 class="game-title">Minesweeper</h1>

    <div class="game-header">
      <div class="header-item">
        <span class="label">Час</span>
        <span id="timer" class="value">0</span>
      </div>

      <button type="button" class="start-button">Нова гра</button>

      <div class="header-item">
        <span class="label">Прапорців</span>
        <span id="flags" class="value">0</span>
      </div>
    </div>

    
    <div 
      class="game-board" 
      id="gameBoard" 
      role="grid" 
      tabindex="0"
      aria-label="Ігрове поле Мінного пошуку">
    </div>

    

    <div class="game-info">
      <p>💡 Ліва кнопка миші: відкрити клітинку</p>
      <p>🖱️ Права кнопка миші: поставити прапорець</p>
      <p>⚙️ Кнопка "Нова гра": почати гру заново</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
