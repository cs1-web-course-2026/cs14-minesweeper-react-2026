<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>cs-14-minesweeper-game-react</title>
  <script>
    var pathSegmentsToKeep = 1; // number of sub-path segments: /cs14-minesweeper-react-2026
    var location = window.location;
    var redirectUrl =
      location.protocol +
      "//" +
      location.hostname +
      (location.port ? ":" + location.port : "") +
      location.pathname
        .split("/")
        .slice(0, 1 + pathSegmentsToKeep)
        .join("/") +
      "/?p=/" +
      location.pathname
        .split("/")
        .slice(1 + pathSegmentsToKeep)
        .join("/")
        .replace(/&/g, "~and~") +
      (location.search
        ? "&q=" + location.search.slice(1).replace(/&/g, "~and~")
        : "") +
      location.hash;
    location.replace(redirectUrl);
  </script>
</head>

<body></body>

</html>
